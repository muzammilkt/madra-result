<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light only">
  <title>Madrasa Annual Exam Result 2026</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Home View -->
  <section id="home-view" class="view active">
    <div class="hero">
      <div class="hero-pattern"></div>
      <div class="hero-content">
        <div class="hero-badge">Annual Examination</div>
        <h1 class="hero-institution">Sulthwanul Hind</h1>
        <div class="hero-divider"></div>
        <p class="hero-exam-title">Result</p>
        <p class="hero-year">2026</p>
      </div>
    </div>
    <div class="home-body">
      <div class="home-card">
        <div class="gold-divider"></div>
        <h2 class="card-heading">Check Result</h2>
        <p class="card-desc">View class-wise ranked results of passed students</p>
        <button id="btn-view-result" class="btn-primary">
          <span>View Result</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </button>
      </div>
      <div class="contact-pill">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <a href="tel:+918281404461">+91 82814 04461</a>
      </div>
      <footer class="home-footer">
        <div class="footer-line"></div>
        <p class="footer-text">Sulthwanul Hind &mdash; Madrasa Annual Examination Portal</p>
      </footer>
    </div>
  </section>

  <!-- Class Selection View -->
  <section id="class-view" class="view">
    <div class="inner-hero">
      <button class="btn-back-light" id="btn-back-home" aria-label="Go back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <h1 class="inner-hero-title">Select Class</h1>
      <p class="inner-hero-sub">Choose a class to view results</p>
    </div>
    <div class="container inner-body">
      <div id="class-grid" class="class-grid"></div>
    </div>
  </section>

  <!-- Result View -->
  <section id="result-view" class="view">
    <div class="inner-hero">
      <button class="btn-back-light" id="btn-back-class" aria-label="Go back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <h1 class="inner-hero-title" id="result-heading"></h1>
      <p class="inner-hero-sub">Passed Students</p>
    </div>
    <div class="container inner-body">
      <ol id="result-list" class="result-list"></ol>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
